<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Dashboard - Monitoring Air</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        .dataTables_wrapper .dataTables_filter input {
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            padding: 0.5rem;
            outline: none;
            margin-bottom: 10px;
        }

        table.dataTable thead th {
            background-color: #f8fafc;
            border-bottom: 1px solid #e2e8f0 !important;
        }

        /* Transisi halus saat pindah mode */
        body {
            transition: background-color 0.3s, color 0.3s;
        }

        .dark .dataTables_wrapper {
            color: #e2e8f0;
        }

        .dark table.dataTable tbody tr {
            background-color: #1e293b;
            color: #f1f5f9;
        }

        .dark .dataTables_filter input {
            background: #334155;
            border-color: #475569;
            color: white;
        }

        /* Mode Terang (Default) */
        body {
            transition: background 0.5s ease;
            background-color: #f8fafc;
            /* slate-50 */
        }

        /* Mode Gelap dengan Gradien */
        .dark body {
            background: radial-gradient(circle at center, #2e345b 0%, #0f172a 100%) !important;
            background-attachment: fixed;
            /* Agar gradien tidak putus saat scroll */
            color: #f1f5f9;
        }
    </style>
</head>

<body
    class="bg-slate-50 min-h-screen p-4 md:p-10 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors">
    <div class="flex items-center gap-4 fixed bottom-2 right-2 z-50">
        <button onclick="toggleDarkMode()"
            class="p-2 rounded-lg bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-yellow-400 transition-all">
            <span id="dark-icon">🌙</span>
        </button>
    </div>
    <div class="max-w-6xl mx-auto">
        <div
            class="bg-white dark:bg-slate-800 dark:border-slate-500 rounded-2xl shadow-sm p-4 mb-4 flex justify-between items-center border border-slate-200">
            <div>
                <h2 class="text-xl font-bold">Monitoring Air</h2>
                <p id="lastUpdate" class="text-xs text-slate-400 font-mono">Menghubungkan...</p>
            </div>
            <div class="flex gap-2">
                <button onclick="clearAllData()"
                    class="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm font-bold border border-red-100 hover:bg-red-500 hover:text-white transition-all">Clear
                    All</button>
                <button onclick="fetchData(true)"
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-blue-700 active:scale-95 transition-all">Refresh</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <div
                class="bg-white dark:bg-slate-800 dark:border-slate-500 p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center">
                <canvas id="gauge-turbidity"></canvas>
                <h3 class="font-bold text-blue-600 mt-2">TURBIDITY (NTU)</h3>
            </div>
            <div
                class="bg-white dark:bg-slate-800 dark:border-slate-500 p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center">
                <canvas id="gauge-temp"></canvas>
                <h3 class="font-bold text-orange-600 mt-2">TEMPERATUR (°C)</h3>
            </div>
            <div
                class="bg-white dark:bg-slate-800 dark:border-slate-500 p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center">
                <canvas id="gauge-ph"></canvas>
                <h3 class="font-bold text-emerald-600 mt-2">pH AIR</h3>
            </div>
        </div>

        <div
            class="bg-white dark:bg-slate-800 dark:border-slate-500 rounded-2xl shadow-sm p-4 mb-4 border border-slate-200">
            <h3 class="text-slate-800 font-bold mb-4 flex items-center gap-2 dark:text-slate-100">
                <span class="w-2 h-4 bg-blue-600 rounded-full"></span>
                Tren Data Sensor (Real-time)
            </h3>
            <div class="h-[300px] w-full">
                <canvas id="sensorChart"></canvas>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800 dark:border-slate-500 rounded-2xl shadow-sm p-4 border border-slate-200">
            <table id="iotTable" class="display responsive nowrap w-full" style="width:100%">
                <thead class="bg-slate-100 dark:bg-slate-700">
                    <tr class="text-slate-500 text-xs bg-slate-100 dark:bg-slate-700">
                        <th class="bg-white dark:bg-slate-700 dark:text-white">TURBIDITY</th>
                        <th class="bg-white dark:bg-slate-700 dark:text-white">pH</th>
                        <th class="bg-white dark:bg-slate-700 dark:text-white">SUHU</th>
                        <th class="bg-white dark:bg-slate-700 dark:text-white">WAKTU</th>
                        <th class="bg-white dark:bg-slate-700 dark:text-white">AKSI</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.rawgit.com/Mikhus/canvas-gauges/master/gauge.min.js"></script>

    <script>
        let table, gaugeTurb, gaugePH, gaugeTemp, sensorChart, isDarkMode;
        const savedTheme = localStorage.getItem('theme');
        isDarkMode = savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
        const gaugePlate = isDarkMode ? '#1e293b' : '#ffffff';

        $(document).ready(function () {
            // 1. Inisialisasi Gauges
            gaugeTurb = new RadialGauge({
                renderTo: 'gauge-turbidity', width: 180, height: 180, units: "NTU", minValue: 0, maxValue: 1000, value: 300,
                majorTicks: ["0", "200", "400", "600", "800", "1000"], highlights: [{ "from": 600, "to": 1000, "color": "#fee2e2" }],
                colorPlate: "#fff", borders: false, needleType: "arrow", animationDuration: 1500, colorPlate: gaugePlate,
            }).draw();

            gaugePH = new RadialGauge({
                renderTo: 'gauge-ph', width: 180, height: 180, units: "pH", minValue: 0, maxValue: 14, value: 7,
                majorTicks: ["0", "2", "4", "6", "8", "10", "12", "14"],
                highlights: [{ "from": 0, "to": 6.5, "color": "#fee2e2" }, { "from": 6.5, "to": 8.5, "color": "#dcfce7" }],
                colorPlate: "#fff", borders: false, needleType: "arrow", animationDuration: 1500, colorPlate: gaugePlate,
            }).draw();

            gaugeTemp = new LinearGauge({
                renderTo: 'gauge-temp', width: 100, height: 180, units: "°C", minValue: -20, maxValue: 50, value: 25,
                majorTicks: ["-20", "0", "20", "50"], colorPlate: "#fff", borders: false, animationDuration: 1500, colorPlate: gaugePlate,
            }).draw();

            // 2. Inisialisasi DataTable
            table = $('#iotTable').DataTable({
                responsive: true,
                order: [[3, 'desc']], // Urutkan berdasarkan kolom waktu
                language: { search: "Cari:", lengthMenu: "Tampil _MENU_" }
            });

            const targets = document.getElementById('sensorChart');
            const ctx = targets.getContext("2d");

            // 1. Create Gradients
            // Turbidity (Biru)
            const gradBlue = ctx.createLinearGradient(0, 230, 0, 50);
            gradBlue.addColorStop(1, 'rgba(59, 130, 246, 0.4)');
            gradBlue.addColorStop(0.2, 'rgba(59, 130, 246, 0.1)');
            gradBlue.addColorStop(0, 'rgba(59, 130, 246, 0)');

            // pH (Pink/Rose sesuai gaya kodemu)
            const gradPink = ctx.createLinearGradient(0, 230, 0, 50);
            gradPink.addColorStop(1, '#fe2a9054');
            gradPink.addColorStop(0.2, '#fe2a9010');
            gradPink.addColorStop(0, '#fe2a9000');

            // Temp (Orange)
            const gradOrange = ctx.createLinearGradient(0, 230, 0, 50);
            gradOrange.addColorStop(1, '#ffae4a54');
            gradOrange.addColorStop(0.2, '#ffae4a10');
            gradOrange.addColorStop(0, '#ffae4a00');
            sensorChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ["-", "-", "-", "-", "-"],
                    datasets: [
                        {
                            label: "Turbidity",
                            yAxisID: 'y', // Gunakan sumbu kiri (0-1000)
                            tension: 0.4,
                            pointRadius: 4, // Ubah jadi 4 agar titik terlihat
                            pointBackgroundColor: "#3b82f6",
                            pointBorderColor: "#fff",
                            pointHoverRadius: 6,
                            borderColor: "#3b82f6",
                            borderWidth: 3,
                            backgroundColor: gradBlue,
                            fill: true,
                            data: [300, 100, 200, 500, 10], // Data awal nol
                        },
                        {
                            label: "pH Air",
                            yAxisID: 'y1', // Gunakan sumbu kanan (0-50 agar pH & Temp terlihat jelas)
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: "#fe2a90",
                            pointBorderColor: "#fff",
                            pointHoverRadius: 6,
                            borderColor: "#fe2a90",
                            borderWidth: 3,
                            backgroundColor: gradPink,
                            fill: true,
                            data: [7, 8, 9, 10, 11], // Data awal netral
                        },
                        {
                            label: "Suhu",
                            yAxisID: 'y1', // Sama dengan pH, gunakan sumbu kanan
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: "#ffae4a",
                            pointBorderColor: "#fff",
                            pointHoverRadius: 6,
                            borderColor: "#ffae4a",
                            borderWidth: 3,
                            backgroundColor: gradOrange,
                            fill: true,
                            data: [25, 26, 27, 28, 29] // Data awal suhu
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false, // Agar tooltip muncul meski kursor tidak pas di titiknya
                    },
                    plugins: {
                        tooltip: {
                            enabled: true,
                            backgroundColor: 'rgba(255, 255, 255, 0.9)',
                            titleColor: '#334155',
                            bodyColor: '#334155',
                            borderColor: '#e2e8f0',
                            borderWidth: 1,
                            padding: 10,
                            displayColors: true,
                            callbacks: {
                                label: function (context) {
                                    let label = context.dataset.label || '';
                                    let val = context.parsed.y; // Ini sudah nilai asli (NTU, pH, atau °C)

                                    // Cukup tambahkan satuan di belakangnya saja
                                    if (label === 'Turbidity') return label + ': ' + val.toFixed(0) + ' NTU';
                                    if (label === 'pH Air') return label + ': ' + val.toFixed(1) + ' pH';
                                    if (label === 'Suhu') return label + ': ' + val.toFixed(1) + ' °C';

                                    return label + ': ' + val;
                                }
                            }
                        }
                    },
                    scales: {
                        y: { // SUMBU KIRI (Turbidity)
                            type: 'linear',
                            display: true,
                            position: 'left',
                            min: -30,
                            max: 1100,
                            title: { display: true, text: 'NTU' },
                            grid: { color: 'rgba(0, 0, 0, 0.05)' }
                        },
                        y1: { // SUMBU KANAN (pH & Suhu)
                            type: 'linear',
                            display: true,
                            position: 'right',
                            min: 0,
                            max: 60, // pH (max 14) dan Suhu (max 50) akan terlihat proporsional di sini
                            title: { display: true, text: 'pH / °C' },
                            grid: { drawOnChartArea: false }, // Agar garis grid tidak tabrakan
                            ticks: {
                                callback: function (value) {
                                    return value + (value === 0 ? '' : ''); // Tetap tampilkan angka apa adanya
                                }
                            }
                        },
                        x: {
                            grid: { display: true, borderDash: [5, 5] }
                        }
                    }
                }
            });

            // 3. Start Polling
            fetchData(true);
            // setInterval(() => fetchData(true), 5000); // Live update tiap 5 detik
            // Jalankan saat load
        });

        let lastLength = 0; // Variabel untuk menyimpan panjang data terakhir
        let setTimeoutId; // Variabel untuk menyimpan ID timeout agar bisa dibersihkan jika perlu

        async function fetchData(isAuto = false) {
            try {
                const res = await fetch('https://render-mongodb.vercel.app/api?last=' + lastLength);
                const status = await res.status;
                if (!res.ok && res.status !== 304) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }

                // Jika 304, kita bisa pilih untuk tidak lanjut ke .json() jika mau hemat CPU
                if (res.status === 304) {
                    console.log("Data masih segar di cache (304), tidak ada perubahan.");
                    return; // Keluar dari fungsi, jangan update tabel
                }
                const respon = await res.json();
                const data = respon.status == 'success' ? respon.data : [];

                if ((data.length > 0 && data.length !== lastLength && respon.status === 'success') || !isAuto) {
                    const latest = data[0];
                    gaugeTurb.value = latest.turbidity || 0;
                    gaugePH.value = latest.ph || 0;
                    gaugeTemp.value = latest.temperature || latest.temp || 0;

                    // --- UPDATE CHART ---
                    // Kita ambil 15 data terakhir saja agar chart tidak penuh
                    const chartData = [...data].reverse().slice(-15);

                    // Label waktu tetap sama
                    sensorChart.data.labels = chartData.map(d =>
                        new Date(d.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    );

                    // Konversi ke Persentase agar bergelombang bersama
                    // Di dalam fetchData()...
                    sensorChart.data.datasets[0].data = chartData.map(d => d.turbidity || 0); // Nilai asli NTU
                    sensorChart.data.datasets[1].data = chartData.map(d => d.ph || 0);        // Nilai asli pH
                    sensorChart.data.datasets[2].data = chartData.map(d => d.temperature || d.temp || 0); // Nilai asli Celcius

                    sensorChart.update();
                } else if(respon.status === 'success') {
                    gaugeTurb.value = 0;
                    gaugePH.value = 0;
                    gaugeTemp.value = 0;
                    sensorChart.data.datasets[0].data = [0, 0, 0, 0, 0];
                    sensorChart.data.datasets[1].data = [0, 0, 0, 0, 0];
                    sensorChart.data.datasets[2].data = [0, 0, 0, 0, 0];
                    sensorChart.update();
                }

                if (data.length !== lastLength || !isAuto) {
                    table.clear();
                    data.forEach(item => {
                        const date = new Date(item.createdAt).toLocaleString('id-ID');
                        table.row.add([
                            `<span class="font-bold text-lg">${item.turbidity || 0}</span>`,
                            `<span class="font-bold text-lg">${item.ph || 0}</span>`,
                            `<span class="font-bold text-lg text-blue-600">${item.temperature || item.temp || 0}°C</span>`,
                            `<span class="text-xs text-slate-400 font-mono">${date}</span>`,
                            `<button onclick="deleteData('${item._id}')" class="text-red-500 underline text-xs">Hapus</button>`
                        ]);
                    });
                    table.draw(isAuto ? false : true);
                    document.getElementById('lastUpdate').innerText = "Update: " + new Date().toLocaleTimeString();
                    lastLength = data.length;
                }
            } catch (err) {
                console.error("Error:", err);
            }

            finally {
                if (setTimeoutId) {
                    clearTimeout(setTimeoutId); // Bersihkan timeout sebelumnya jika masih ada
                }
                isAuto && (setTimeoutId = setTimeout(() => {
                    fetchData(true)
                }, 3000)); // Jadwalkan polling berikutnya hanya jika ini adalah update otomatis
            }
        }

        async function deleteData(id) {
            if (confirm('Hapus data ini?')) {
                await fetch(`https://render-mongodb.vercel.app/api?id=${id}`, { method: 'DELETE' });
                fetchData();
            }
        }

        async function clearAllData() {
            if (confirm('Hapus SEMUA data?')) {
                await fetch('https://render-mongodb.vercel.app/api', { method: 'DELETE' });
                fetchData();
            }
        }
        // Fungsi untuk mengecek dan menerapkan tema sistem
        function applySystemTheme() {
            const html = document.documentElement;
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const savedTheme = localStorage.getItem('theme');

            // Prioritas: 1. Pilihan manual user (jika ada), 2. Tema sistem
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                html.classList.add('dark');
                updateUIIcon(true);
            } else {
                html.classList.remove('dark');
                updateUIIcon(false);
            }
        }

        function updateUIIcon(isDark) {
            const icon = document.getElementById('dark-icon');
            if (icon) icon.innerText = isDark ? '☀️' : '🌙';
            syncVisualsWithTheme(isDark);
        }


        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            // Hanya berubah otomatis jika user belum pernah mengklik tombol manual
            if (!localStorage.getItem('theme')) {
                const newIsDark = e.matches;
                document.documentElement.classList.toggle('dark', newIsDark);
                updateUIIcon(newIsDark);

                // Panggil fungsi update chart/gauge yang sudah kita buat sebelumnya
                syncVisualsWithTheme(newIsDark);
            }
        });
        function toggleDarkMode() {
            const html = document.documentElement;
            const isDark = html.classList.toggle('dark');

            // Simpan pilihan user agar sistem tidak menimpanya otomatis nanti
            localStorage.setItem('theme', isDark ? 'dark' : 'light');

            updateUIIcon(isDark);
            syncVisualsWithTheme(isDark);
        }

        // Fungsi pembantu untuk update Chart & Gauge (disatukan agar rapi)
        function syncVisualsWithTheme(isDark) {
            if (sensorChart) {
                const gridColor = isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)';
                sensorChart.options.scales.y.grid.color = gridColor;
                sensorChart.options.scales.x.grid.color = gridColor;
                sensorChart.update();
            }
            const gaugePlate = isDarkMode ? '#1e293b' : '#ffffff';
            [gaugeTurb, gaugePH, gaugeTemp].forEach(g => {
                if (g) g.update({ colorPlate: gaugePlate });
            });
        }

        applySystemTheme();

    </script>
</body>

</html>
